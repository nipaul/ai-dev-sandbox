<svg width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
<style>
.bt{font-family:'Courier New',Courier,monospace;font-size:26px;font-weight:600;fill:#26215C}
.bs{font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:400;fill:#5F5E5A}
.bc{font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:400;fill:#888780}
.pt{font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:500}
.conn{stroke:#B4B2A9;stroke-width:0.6;opacity:0.45}

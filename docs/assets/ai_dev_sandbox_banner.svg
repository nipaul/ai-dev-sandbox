  .p-purple{fill:#3C3489;stroke:#7F77DD}
  .p-amber{fill:#633806;stroke:#EF9F27}
  .t-teal{fill:#9FE1CB}
  .t-purple{fill:#CECBF6}
  .t-amber{fill:#FAC775}
}

# =============================================================================
# local-ai-sandbox — Docker Compose Stack
# =============================================================================
# Target:   Windows 11 · Docker Desktop (WSL2) · Ubuntu 24.04 WSL2 Distro
# Guide:    docker-ai-sandbox-guide.md
#
# USAGE
# ─────
# Start default stack (Ollama + API + Jupyter):
#   docker compose up -d
#
# Start with ML training:
#   docker compose --profile training up -d
#
# Start with monitoring (Portainer):
#   docker compose --profile monitoring up -d
#
# Start everything:
#   docker compose --profile training --profile monitoring up -d
#
# Validate before starting (always run this first):
#   docker compose config
#
# GPU ACTIVATION
# ──────────────
# Only ONE GPU section should be uncommented at a time.
# Search for "GPU-ACTIVATE" to find all toggle points.
#
#   NVIDIA  → uncomment the 'deploy.resources.reservations.devices' block
#   AMD     → uncomment the 'devices' + 'x-wsl-libs' volume lines
#   Intel   → uncomment the 'devices' + 'x-wsl-libs' volume lines
#             + set OLLAMA_INTEL_GPU=1 in the environment block
#
# PERFORMANCE NOTES
# ─────────────────
# - Store models/datasets under ~/ai-sandbox/ inside WSL2 (not /mnt/c/)
# - shm_size values are tuned for ML workloads — reduce if RAM is limited
# - Resource limits are conservative starting points — adjust via docker stats
#
# SECRETS
# ───────
# Copy .env.example → .env and fill in your values before starting.
# Never commit .env to version control.
# =============================================================================

name: local-ai-sandbox

# ─────────────────────────────────────────────────────────────────────────────
# EXTENSION FIELDS
# Reusable YAML anchors to avoid repeating common config blocks.
# ─────────────────────────────────────────────────────────────────────────────

x-security-defaults: &security-defaults
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-wsl-gpu-libs: &wsl-gpu-libs
  # AMD / Intel GPU: WSL2 DirectX libraries (read-only)
  # Uncomment when using AMD or Intel GPU passthrough (GPU-ACTIVATE)
  # - /usr/lib/wsl:/usr/lib/wsl:ro
  []

# ─────────────────────────────────────────────────────────────────────────────
# SERVICES
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # OLLAMA — LLM Inference Server
  # Serves local LLM models (Llama 3, Mistral, etc.) via REST API
  # API available at: http://localhost:11434
  # Pull a model:  docker exec -it ollama ollama pull llama3.2:1b
  # Run a model:   docker exec -it ollama ollama run llama3.2:1b
  # ═══════════════════════════════════════════════════════════════════════════
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      # Bound to localhost only — not exposed to other machines on your network
      - "127.0.0.1:11434:11434"
    volumes:
      # Named volume — persists downloaded models across container restarts
      - ollama_models:/root/.ollama
      # AMD / Intel GPU: WSL2 DirectX libraries (GPU-ACTIVATE)
      # - /usr/lib/wsl:/usr/lib/wsl:ro
    # ── GPU-ACTIVATE: Uncomment ONE block below that matches your hardware ──

    # OPTION A — NVIDIA GPU
    # deploy:
    #   resources:
    #     limits:
    #       memory: 20G
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

    # OPTION B — AMD GPU
    # devices:
    #   - /dev/dxg:/dev/dxg

    # OPTION C — Intel GPU (UHD / Iris Xe / Arc)
    # devices:
    #   - /dev/dxg:/dev/dxg

    # ── Default resource limits (used when no GPU block is active) ──────────
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 20G
        reservations:
          memory: 4G

    environment:
      # Intel GPU only — switches Ollama to use Intel GPU backend (GPU-ACTIVATE)
      # - OLLAMA_INTEL_GPU=1

      # Keep models loaded in memory between requests (improves response time)
      - OLLAMA_KEEP_ALIVE=5m

      # Maximum number of models loaded simultaneously
      - OLLAMA_MAX_LOADED_MODELS=2

    # Shared memory for model loading — default 64MB is too small
    shm_size: '4gb'

    <<: *security-defaults
    networks:
      # inference_net is internal — Ollama cannot make outbound internet calls
      - inference_net

  # ═══════════════════════════════════════════════════════════════════════════
  # API — FastAPI Backend Service
  # Provider-agnostic backend that calls Ollama internally.
  # Swap OLLAMA_BASE_URL in .env to point at a cloud provider in production.
  # API available at: http://localhost:8000
  # Health check:    http://localhost:8000/health
  # ═══════════════════════════════════════════════════════════════════════════
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ai-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      # All secrets and config loaded from .env — never hardcode here
      - .env
    environment:
      # Internal Docker DNS — resolves to the ollama container by name
      - OLLAMA_BASE_URL=http://ollama:11434
      - APP_ENV=development
    depends_on:
      ollama:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    <<: *security-defaults
    cap_add:
      # Needed to bind to port 8000 — add back only what is required
      - NET_BIND_SERVICE
    networks:
      # On both networks: can reach Ollama (inference_net) and be reached externally (api_net)
      - inference_net
      - api_net

  # ═══════════════════════════════════════════════════════════════════════════
  # JUPYTER — JupyterLab Notebook Server
  # For exploratory work, dataset analysis, and prototyping.
  # Access at: http://localhost:8888?token=<your-JUPYTER_TOKEN-from-.env>
  # ═══════════════════════════════════════════════════════════════════════════
  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: jupyter
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8888"
    volumes:
      # Notebooks saved here persist outside the container
      - ./notebooks:/home/jovyan/work
      # Models and datasets are read-only — containers cannot corrupt source files
      - ./models:/home/jovyan/models:ro
      - ./datasets:/home/jovyan/data:ro
      # Outputs (results, exports) are writable
      - ./outputs:/home/jovyan/outputs
    environment:
      - JUPYTER_ENABLE_LAB=yes
      # Token loaded from .env — change default immediately
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
      # Grant jovyan user write access to work directory
      - CHOWN_HOME=yes
      - CHOWN_HOME_OPTS=-R
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          memory: 1G
    <<: *security-defaults
    networks:
      - api_net

  # ═══════════════════════════════════════════════════════════════════════════
  # TRAINER — ML Training Container (on-demand)
  # NOT started by default — only runs with: --profile training
  # Keeps always-on resource usage low when training is not active.
  #
  # Start:  docker compose --profile training up -d
  # Stop:   docker compose --profile training down
  # ═══════════════════════════════════════════════════════════════════════════
  trainer:
    build:
      context: ./trainer
      dockerfile: Dockerfile
    container_name: ml-trainer
    profiles:
      - training
    volumes:
      # Datasets and models are read-only inputs
      - ./datasets:/data:ro
      - ./models:/models:ro
      # Outputs (checkpoints, logs, results) are writable
      - ./outputs:/outputs
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    # ── GPU-ACTIVATE: Uncomment ONE block below that matches your hardware ──

    # OPTION A — NVIDIA GPU
    # deploy:
    #   resources:
    #     limits:
    #       memory: 24G
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

    # OPTION B — AMD GPU
    # devices:
    #   - /dev/dxg:/dev/dxg

    # OPTION C — Intel GPU
    # devices:
    #   - /dev/dxg:/dev/dxg
    # environment:
    #   - PYTHONUNBUFFERED=1
    #   - IPEX_TILE_DEVICE=0

    # ── Default resource limits ─────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: '6.0'
          memory: 24G
        reservations:
          memory: 4G

    # Large shared memory — essential for PyTorch DataLoader multi-worker loading
    shm_size: '8gb'

    <<: *security-defaults
    networks:
      - inference_net

  # ═══════════════════════════════════════════════════════════════════════════
  # NGINX — Reverse Proxy (IIS Bridge)
  # Bridges Linux AI services and Windows-hosted IIS apps under a single port.
  # host.docker.internal resolves to the Windows host from inside containers.
  # Access at: http://localhost:80
  # ═══════════════════════════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
    volumes:
      # Mount your nginx config — edit ./nginx/nginx.conf for routing rules
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ollama
      - api
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    <<: *security-defaults
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - api_net

  # ═══════════════════════════════════════════════════════════════════════════
  # PORTAINER — Container Management GUI (on-demand)
  # Visual dashboard for monitoring containers, logs, and resource usage.
  # NOT started by default — only runs with: --profile monitoring
  # Access at: https://localhost:9443 (self-signed cert on first run)
  #
  # Start:  docker compose --profile monitoring up -d
  # ═══════════════════════════════════════════════════════════════════════════
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    profiles:
      - monitoring
    restart: unless-stopped
    ports:
      - "127.0.0.1:9443:9443"
    volumes:
      # Docker socket access — required for Portainer to manage containers
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    networks:
      - api_net

# ─────────────────────────────────────────────────────────────────────────────
# NETWORKS
# Every network referenced in a service must be defined here.
# ─────────────────────────────────────────────────────────────────────────────

networks:

  inference_net:
    driver: bridge
    # internal: true prevents containers on this network from making
    # outbound internet calls — good for inference services that should
    # only communicate with other containers, not external APIs.
    # Uncomment once you confirm your stack works correctly end-to-end.
    # internal: true

  api_net:
    # Standard bridge — containers can reach the internet and be reached
    # from the host. Used for services that call external APIs.
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
# VOLUMES
# Every named volume referenced in a service must be defined here.
# Named volumes persist across container restarts and removals.
# ─────────────────────────────────────────────────────────────────────────────

volumes:

  ollama_models:
    # Stores downloaded model weights — persists across ollama container restarts
    driver: local

  portainer_data:
    # Stores Portainer configuration and user data
    driver: local
